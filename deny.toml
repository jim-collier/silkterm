# cargo-deny policy (cicd runs `cargo deny check` in the tests stage, advisory-
# only for now). Project license is GPL-2.0-or-later; the graph contains
# Apache-2.0-only crates (winit, glutin, alacritty_terminal, ...), which are
# GPLv2-incompatible but GPLv3-compatible - so distributed binaries effectively
# convey under GPL-3.0 terms. That is fine; never tighten the crate license to
# GPL-2.0-only. The dev-only `profiling` feature pulls inferno (CDDL-1.0,
# GPL-incompatible): local tooling only, profiling builds must never ship -
# default features only are checked here for exactly that reason.

[graph]
all-features = false

[licenses]
allow = [
	"MIT",
	"Apache-2.0",
	"Apache-2.0 WITH LLVM-exception",
	"BSD-2-Clause",
	"BSD-3-Clause",
	"BSL-1.0",
	"ISC",
	"Zlib",
	"Unicode-3.0",
	"Unicode-DFS-2016",
	"CC0-1.0",
	"MPL-2.0",
	"OFL-1.1",
	"GPL-2.0-or-later",
	"GPL-2.0", # self_cell offers "Apache-2.0 OR GPL-2.0-only"
]

[bans]
# the double skrifa/read-fonts stack (cosmic-text vs swash) is upstream's to
# converge; warn so a glyphon bump that fixes it is visible, don't gate on it
multiple-versions = "warn"

[advisories]
yanked = "warn"
ignore = [
	# ttf-parser is declared unmaintained; it reaches us only transitively
	# (cosmic-text/fontdb and winit/sctk-adwaita). Nothing actionable until
	# upstream migrates to skrifa - re-check on glyphon/winit bumps.
	{ id = "RUSTSEC-2026-0192", reason = "transitive, no safe upgrade; upstream's migration" },
]
